<!-- Шаблон панели метаданных сообщения Horae -->
<div class="horae-message-panel" data-message-id="{{messageId}}">
    <div class="horae-panel-toggle">
        <div class="horae-panel-icon">
            <i class="fa-regular fa-clock"></i>
        </div>
        <div class="horae-panel-summary">
            <span class="horae-summary-time">{{time}}</span>
            <span class="horae-summary-divider">|</span>
            <span class="horae-summary-event">{{eventSummary}}</span>
            <span class="horae-summary-divider">|</span>
            <span class="horae-summary-chars">{{characterCount}} присутствуют</span>
        </div>
        <div class="horae-panel-actions">
            <button class="horae-btn-edit" title="Редактировать">
                <i class="fa-solid fa-pen"></i>
            </button>
            <button class="horae-btn-expand" title="Развернуть/свернуть">
                <i class="fa-solid fa-chevron-down"></i>
            </button>
        </div>
    </div>
    <div class="horae-panel-content" style="display: none;">
        <div class="horae-panel-grid">
            <!-- Строка времени -->
            <div class="horae-panel-row">
                <label><i class="fa-regular fa-clock"></i> Время</label>
                <div class="horae-panel-value">
                    <input type="text" class="horae-input-datetime" placeholder="Дата Время (напр. 2026/2/4 15:00)" value="{{storyDate}}{{#storyTime}} {{storyTime}}{{/storyTime}}">
                </div>
            </div>

            <!-- Строка места -->
            <div class="horae-panel-row">
                <label><i class="fa-solid fa-location-dot"></i> Место</label>
                <div class="horae-panel-value">
                    <input type="text" class="horae-input-location" placeholder="Напр.: Кафе > Второй этаж" value="{{location}}">
                </div>
            </div>

            <!-- Строка атмосферы -->
            <div class="horae-panel-row">
                <label><i class="fa-solid fa-cloud"></i> Атмосфера</label>
                <div class="horae-panel-value">
                    <input type="text" class="horae-input-atmosphere" placeholder="Напр.: расслабленная, напряжённая" value="{{atmosphere}}">
                </div>
            </div>

            <!-- Присутствующие персонажи -->
            <div class="horae-panel-row">
                <label><i class="fa-solid fa-users"></i> Присутствуют</label>
                <div class="horae-panel-value">
                    <input type="text" class="horae-input-characters" placeholder="Через запятую" value="{{characters}}">
                </div>
            </div>

            <!-- Список нарядов -->
            <div class="horae-panel-row full-width">
                <label><i class="fa-solid fa-shirt"></i> Изменения нарядов</label>
                <div class="horae-costume-editor" id="horae-costumes-{{messageId}}">
                    {{costumeEditors}}
                </div>
                <button class="horae-btn-add-costume" title="Добавить запись о наряде">
                    <i class="fa-solid fa-plus"></i> Добавить
                </button>
            </div>

            <!-- Список предметов -->
            <div class="horae-panel-row full-width">
                <label><i class="fa-solid fa-box-open"></i> Изменения предметов</label>
                <div class="horae-items-editor" id="horae-items-{{messageId}}">
                    {{itemEditors}}
                </div>
                <button class="horae-btn-add-item" title="Добавить запись о предмете">
                    <i class="fa-solid fa-plus"></i> Добавить
                </button>
            </div>

            <!-- Метка события -->
            <div class="horae-panel-row full-width">
                <label><i class="fa-solid fa-bookmark"></i> Метка события</label>
                <div class="horae-event-editor">
                    <select class="horae-input-event-level">
                        <option value="">Нет</option>
                        <option value="Обычное" {{eventLevelNormal}}>Обычное</option>
                        <option value="Важное" {{eventLevelImportant}}>Важное</option>
                        <option value="Ключевое" {{eventLevelCritical}}>Ключевое</option>
                    </select>
                    <input type="text" class="horae-input-event-summary" placeholder="Краткое описание события (до 20 символов)" value="{{eventSummaryText}}">
                </div>
            </div>

            <!-- Изменения симпатии -->
            <div class="horae-panel-row full-width">
                <label><i class="fa-solid fa-heart"></i> Изменения симпатии</label>
                <div class="horae-affection-editor" id="horae-affection-{{messageId}}">
                    {{affectionEditors}}
                </div>
                <button class="horae-btn-add-affection" title="Добавить изменение симпатии">
                    <i class="fa-solid fa-plus"></i> Добавить
                </button>
            </div>
        </div>

        <div class="horae-panel-footer">
            <button class="horae-btn-save horae-btn">
                <i class="fa-solid fa-check"></i> Сохранить
            </button>
            <button class="horae-btn-cancel horae-btn">
                <i class="fa-solid fa-xmark"></i> Отмена
            </button>
            <button class="horae-btn-goto horae-btn" title="Перейти к этому сообщению">
                <i class="fa-solid fa-arrow-right"></i> Перейти
            </button>
        </div>
    </div>
</div>
